<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DamnModz</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background-color: #111;
            min-height: 300vh;
        }

        header {
            position: sticky;
            top: 0;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            height: 50px;
            background-color: #1c1c1c;
            border-bottom: 2px solid #e04040;
        }

        .logo {
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .logo-damn {
            color: #ffffff;
        }

        .logo-modz {
            color: #e04040;
        }

        nav {
            display: flex;
            align-items: center;
            gap: 35px;
        }

        nav a {
            color: #cccccc;
            text-decoration: none;
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            transition: color 0.2s ease;
            white-space: nowrap;
        }

        nav a:hover {
            color: #ffffff;
        }

        .header-icons {
            display: flex;
            align-items: center;
            gap: 18px;
        }

        .header-icons button {
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .header-icons svg {
            width: 18px;
            height: 18px;
            fill: none;
            stroke: #cccccc;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            transition: stroke 0.2s ease;
        }

        .header-icons button:hover svg {
            stroke: #ffffff;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <span class="logo-damn">DAMN</span><span class="logo-modz">MODZ</span>
        </div>

        <nav>
            <a href="#">Browse Games</a>
            <a href="#">Blog</a>
            <a href="#">Affiliate Program</a>
            <a href="#">Contact Us</a>
        </nav>

        <div class="header-icons">
            <button aria-label="Search">
                <svg viewBox="0 0 24 24">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
            </button>
            <button aria-label="Cart">
                <svg viewBox="0 0 24 24">
                    <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"></path>
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <path d="M16 10a4 4 0 01-8 0"></path>
                </svg>
            </button>
        </div>
    </header>
</body>
</html>
